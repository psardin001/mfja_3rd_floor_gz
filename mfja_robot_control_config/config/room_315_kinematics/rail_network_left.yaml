schema_version: 2
network_id: room_315_left_directed_one_way
description: 'Explicit directed rail topology for the room 315 left-rail shuttle
  network. Every segment is traversed forward-only, from CSV index 0 to the last
  row.

  '
source_csv_dir: mfja_robot_control_config/config/room_315_kinematics/raw_segments
normalized_csv_dir: mfja_robot_control_config/config/room_315_kinematics/normalized_segments
snap_tolerance_m: 0.05
motion_policy:
  segment_direction: forward_only
  traversal_rule: from_csv_index_0_to_last
  reverse_traversal_allowed: false
  on_missing_successor: FALLING
  topology_source_of_truth: explicit_nodes_and_routing_tables
switch_state_space:
  values:
  - G
  - S
  note: 'Switch states match the segment suffixes. G selects the G branch, and S selects
    the S branch. A later command layer may expose LEFT/RIGHT aliases if desired.

    '
stopper_state_space:
  values:
  - '0'
  - '1'
  note: 'Stopper states are independent from switch states. 0 means open/released,
    and 1 means stop/closed.

    '
